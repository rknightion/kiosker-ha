name: Release Please

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release-please:
    permissions:
      contents: write # release-please creates/updates releases and tags
      pull-requests: write # release-please opens and updates release PRs
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  upload-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write # gh release upload and gh release edit to attach assets and update release notes
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Create integration zip
        run: |
          VERSION="${NEEDS_RELEASE_PLEASE_OUTPUTS_VERSION}"
          echo "Creating zip for version ${VERSION}"

          # Create zip from inside the integration directory
          cd "${{ github.workspace }}/custom_components/kiosker"
          zip -r "kiosker.zip" ./ -x "*.pyc" "*/__pycache__/*" "*/.DS_Store"

          # Move zip back to workspace
          mv "kiosker.zip" "${GITHUB_WORKSPACE}/"
        env:
          NEEDS_RELEASE_PLEASE_OUTPUTS_VERSION: ${{ needs.release-please.outputs.version }}

      - name: Upload zip to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEEDS_RELEASE_PLEASE_OUTPUTS_VERSION: ${{ needs.release-please.outputs.version }}
          NEEDS_RELEASE_PLEASE_OUTPUTS_TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          VERSION="${NEEDS_RELEASE_PLEASE_OUTPUTS_VERSION}"
          TAG_NAME="${NEEDS_RELEASE_PLEASE_OUTPUTS_TAG_NAME}"
          ZIP_FILE="kiosker.zip"

          echo "Uploading ${ZIP_FILE} to release ${TAG_NAME}"

          gh release upload "${TAG_NAME}" "${ZIP_FILE}" --clobber

      - name: Comment on release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEEDS_RELEASE_PLEASE_OUTPUTS_TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          NEEDS_RELEASE_PLEASE_OUTPUTS_VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          TAG_NAME="${NEEDS_RELEASE_PLEASE_OUTPUTS_TAG_NAME}"
          VERSION="${NEEDS_RELEASE_PLEASE_OUTPUTS_VERSION}"

          gh release view "${TAG_NAME}" --json body -q '.body' > release_body.txt

          cat >> release_body.txt <<EOF

          ---

          ## Installation

          Download \`kiosker.zip\` and extract to your Home Assistant \`custom_components\` directory.

          Or use HACS to install this integration.
          EOF

          gh release edit "${TAG_NAME}" --notes-file release_body.txt
